name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: lotusdb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d lotusdb"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/lotusdb
      TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/lotusdb_test
      REDIS_URL: redis://localhost:6379/0
      CELERY_TASKS_ENABLED: "false"
      CACHE_ENABLED: "false"
      RATE_LIMIT_ENABLED: "false"
      WS_PUBSUB_ENABLED: "false"
      AUTH_JWT__PUBLIC_KEY_PATH: certs/public.pem
      AUTH_JWT__PRIVATE_KEY_PATH: certs/private.pem

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Generate JWT keys
        run: |
          mkdir -p certs
          openssl genrsa -out certs/private.pem 2048
          openssl rsa -in certs/private.pem -pubout -out certs/public.pem

      - name: Create test database
        run: |
          uv run python - <<'PY'
          import psycopg

          with psycopg.connect(
              "postgresql://postgres:postgres@localhost:5432/postgres",
              autocommit=True,
          ) as connection:
              connection.execute("CREATE DATABASE lotusdb_test")
          PY

      - name: Lint
        run: uv run ruff check app tests alembic

      - name: Compile
        run: uv run python -m compileall -q app tests alembic

      - name: Apply migrations
        run: uv run alembic upgrade head

      - name: Check migrations
        run: uv run alembic check

      - name: Test
        run: uv run pytest -q
